# .github/workflows/gameserver.yml
#
# Manually-triggered workflow that:
#   1. Checks out the repo
#   2. Compiles the test server (server/server_main.cpp) on Ubuntu
#   3. Starts it in the background
#   4. Opens a Cloudflare Quick Tunnel so the outside world can reach it
#   5. Prints the public tunnel URL to the Actions log
#   6. Keeps running for up to 6 hours (the GitHub Actions maximum)
#
# TRIGGER: go to Actions tab in GitHub -> "Run Game Server" -> Run workflow
#
# USAGE AFTER TRIGGER:
#   1. Watch the "Start server + tunnel" step log
#   2. Look for a line like:
#        https://random-words-here.trycloudflare.com
#   3. In your browser dev console:
#        const ws = new WebSocket('wss://random-words-here.trycloudflare.com');
#        ws.onmessage = e => console.log(e.data);
#        ws.onopen = () => ws.send('ping');
#   4. You should see: pong, then heartbeat:1, heartbeat:2, ...
#
# NOTE: Cloudflare Quick Tunnels use wss:// (TLS) automatically, so use
# wss:// not ws:// in the browser even though the server itself is plain ws://.
# Cloudflare handles the TLS termination at their edge.

name: Run Game Server

on:
  workflow_dispatch:  # manual trigger only - no auto-run on push

jobs:
  serve:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hour max (GitHub Actions limit)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          # Boost is pre-installed on ubuntu-latest but libboost-dev
          # ensures the headers are present. Beast is header-only inside Boost.
          sudo apt-get install -y libboost-dev libboost-system-dev

      - name: Compile test server
        working-directory: server
        run: |
          g++ server_main.cpp -o gameserver -std=c++17 \
            -lboost_system -lpthread
          echo "Build successful"
          ls -lh gameserver

      - name: Install cloudflared tunnel
        run: |
          # Download the cloudflared binary directly from Cloudflare's releases.
          # No account or token needed for Quick Tunnels (temporary URLs).
          curl -L \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o cloudflared
          chmod +x cloudflared
          ./cloudflared --version

      - name: Start server and tunnel
        working-directory: server
        run: |
          # Start the game server in the background.
          # Output goes to server.log so we can tail it for diagnostics.
          ./gameserver > server.log 2>&1 &
          SERVER_PID=$!
          echo "Game server started (PID $SERVER_PID)"

          # Give the server a moment to bind the port before tunneling.
          sleep 2

          # Verify the server is actually listening before opening the tunnel.
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "ERROR: server process died. Last log:"
            cat server.log
            exit 1
          fi

          echo "Server is running. Opening Cloudflare tunnel..."

          # cloudflared tunnel --url points a Quick Tunnel at localhost:9000.
          # It prints the public URL to stderr (look for the https:// line).
          # We tee to tunnel.log and also print to the Actions log in real time.
          #
          # The URL looks like: https://random-words.trycloudflare.com
          # Use wss:// (not ws://) from the browser - Cloudflare adds TLS.
          ./cloudflared tunnel --url http://localhost:9000 2>&1 | tee tunnel.log &
          TUNNEL_PID=$!

          # Wait for the tunnel URL to appear in the log (up to 30 seconds).
          echo "Waiting for tunnel URL..."
          for i in $(seq 1 30); do
            URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then
              echo ""
              echo "============================================"
              echo "TUNNEL URL: $URL"
              echo "WebSocket:  ${URL/https/wss}"
              echo "============================================"
              echo ""
              echo "Test in browser console:"
              echo "  const ws = new WebSocket('${URL/https/wss}');"
              echo "  ws.onmessage = e => console.log(e.data);"
              echo "  ws.onopen = () => ws.send('ping');"
              break
            fi
            sleep 1
          done

          if [ -z "$URL" ]; then
            echo "WARNING: tunnel URL not found after 30s. Check tunnel.log:"
            cat tunnel.log
          fi

          # Tail the server log so you can see connections/heartbeats in
          # the Actions log while the workflow runs.
          echo "--- Server log (live) ---"
          tail -f server.log &

          # Keep the workflow alive until GitHub's 6-hour limit.
          # The server and tunnel run as background processes.
          wait $SERVER_PID
