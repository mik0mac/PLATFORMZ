name: Run Game Server

on:
  workflow_dispatch:

jobs:
  serve:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # hard cap: the server shuts down after 2h

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libboost-dev libboost-system-dev

      - name: Compile test server
        working-directory: server
        run: |
          make
          echo "Build successful"

      - name: Start server and tunnel
        run: |
          # Start game server - stdout is unbuffered so log appears immediately
          cd server
          ./gameserver > server.log 2>&1 &
          SERVER_PID=$!
          cd ..

          # Give it 3 seconds to either start successfully or crash
          sleep 3

          echo "--- Server startup log ---"
          cat server/server.log
          echo "--- End startup log ---"

          # Bail out if server already died
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "ERROR: server died on startup (see log above)"
            exit 1
          fi

          # Download and start cloudflared tunnel
          curl -L \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:9000 > tunnel.log 2>&1 &

          echo "Waiting for tunnel URL..."
          for i in $(seq 1 30); do
            URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then
              echo ""
              echo "============================================"
              echo "TUNNEL URL: $URL"
              echo "WebSocket:  ${URL/https/wss}"
              echo ""
              echo "PLAY (no install - opens in a browser):"
              echo "  https://mik0mac.github.io/PLATFORMZ/web/platformz.html?server=${URL/https/wss}"
              echo "============================================"
              echo ""
              echo "Test in browser console:"
              echo "  const ws = new WebSocket('${URL/https/wss}');"
              echo "  ws.onmessage = e => { const d=JSON.parse(e.data); console.log(d.type, d); };"
              echo "  ws.onopen = () => setInterval(() => ws.send(JSON.stringify({seq:Date.now(),mx:0,mz:1,jp:false,grav:false,fire:false,yaw:-1.57,pitch:0})), 16);"
              break
            fi
            sleep 1
          done

          if [ -z "$URL" ]; then
            echo "WARNING: no tunnel URL after 30s"
            cat tunnel.log
          fi

          echo "--- Server log (live) ---"
          tail -f server/server.log &

          # Idle watchdog: shut the server down after 15 min with no connected
          # players (the job's timeout-minutes is the separate hard 2h cap). The
          # server prints a heartbeat "tick N  players C  asteroids A" once per
          # second; any C > 0 counts as activity and resets the idle clock. A
          # fresh server with nobody connected gets a full 15 min grace so there's
          # time to connect after the tunnel URL is posted above.
          IDLE_LIMIT=$((15 * 60))       # seconds of zero players before we quit
          last_active=$(date +%s)

          while kill -0 $SERVER_PID 2>/dev/null; do
            sleep 30
            now=$(date +%s)
            # Latest heartbeat's connected-player count ('|| true' so an empty
            # grep doesn't trip the shell's pipefail/-e and fail the step).
            players=$(grep -oE 'players [0-9]+' server/server.log | tail -1 | awk '{print $2}' || true)
            if [ -n "$players" ] && [ "$players" -gt 0 ]; then
              last_active=$now
            fi
            if [ $((now - last_active)) -ge $IDLE_LIMIT ]; then
              echo "No connected players for $((IDLE_LIMIT / 60)) min - shutting down idle server."
              kill $SERVER_PID 2>/dev/null || true
              break
            fi
          done

          echo "Server exiting."
          wait $SERVER_PID 2>/dev/null || true
