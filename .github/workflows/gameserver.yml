name: Run Game Server

on:
  workflow_dispatch:

jobs:
  serve:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libboost-dev libboost-system-dev

      - name: Compile test server
        working-directory: server
        run: |
          make
          echo "Build successful"

      - name: Start server and tunnel
        run: |
          # Start game server from its directory
          cd server
          ./gameserver > server.log 2>&1 &
          SERVER_PID=$!
          echo "Game server started (PID $SERVER_PID)"
          sleep 2

          # Verify server is still running
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "ERROR: server died. Log:"
            cat server.log
            exit 1
          fi

          # Download cloudflared into current directory (server/)
          cd ..
          curl -L \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o cloudflared
          chmod +x cloudflared
          echo "cloudflared downloaded: $(./cloudflared --version)"

          # Open tunnel pointing at server port
          ./cloudflared tunnel --url http://localhost:9000 > tunnel.log 2>&1 &

          # Wait for URL to appear
          echo "Waiting for tunnel URL..."
          for i in $(seq 1 30); do
            URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then
              echo ""
              echo "============================================"
              echo "TUNNEL URL: $URL"
              echo "WebSocket:  ${URL/https/wss}"
              echo "============================================"
              echo ""
              echo "Paste in browser console to test:"
              echo "  const ws = new WebSocket('${URL/https/wss}');"
              echo "  ws.onmessage = e => console.log(e.data);"
              echo "  ws.onopen = () => ws.send('ping');"
              break
            fi
            sleep 1
          done

          if [ -z "$URL" ]; then
            echo "WARNING: no tunnel URL after 30s"
            cat tunnel.log
          fi

          # Tail server log live so you can see connections in Actions log
          echo "--- Server log (live) ---"
          tail -f server/server.log &

          # Block until server exits (keeps workflow alive up to 6hr limit)
          wait $SERVER_PID
